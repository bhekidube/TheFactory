name: Azure Static Web Apps CI/CD - topcaves

on:
  push:
    branches:
      - dev
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - dev

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.6'

      - name: Force Oryx Node Version
        run: echo "NODE_VERSION=20.19.6" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: ./topcaves
        run: npm install

      - name: Build Angular App
        working-directory: ./topcaves
        run: npm run build

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TOPCAVES }}
          repo_token: ${{ secrets.TOPCAVES_DEP_SECRET}}
          action: "upload"
          app_location: "topcaves"
          output_location: "topcaves/dist/topcaves/browser"
          app_artifact_location: "topcaves/dist/topcaves/browser"
        env:
          node_version: "20.19.6"
