name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - dev
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - dev

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Force Oryx Node Version
        run: echo "NODE_VERSION=20.19.0" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: ./newdomain
        run: npm install

      - name: Build Angular App
        working-directory: ./newdomain
        run: npm run build

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.TEMU_AUTH_SECRET }}
          repo_token: ${{ secrets.TEMU_AUTH_SECRET }}
          action: "upload"
          app_location: "newdomain"
          output_location: "dist/newdomain/browser"
        env:
          node_version: "20.19.0"
