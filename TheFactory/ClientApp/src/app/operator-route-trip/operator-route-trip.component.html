<div style="height: 400px; overflow: auto;">
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

    <!-- Column 1 -->
    <ng-container matColumnDef="column1">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Column 1</th>
      <td mat-cell *matCellDef="let row">{{ row.column1 }}</td>
    </ng-container>

    <!-- Column 2 -->
    <ng-container matColumnDef="column2">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Column 2</th>
      <td mat-cell *matCellDef="let row">{{ row.column2 }}</td>
    </ng-container>

    <!-- Column 3 -->
    <ng-container matColumnDef="column3">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Column 3</th>
      <td mat-cell *matCellDef="let row">{{ row.column3 }}</td>
    </ng-container>

    <!-- Column 4 -->
    <ng-container matColumnDef="column4">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Column 4</th>
      <td mat-cell *matCellDef="let row">{{ row.column4 }}</td>
    </ng-container>

    <!-- Column 5 -->
    <ng-container matColumnDef="column5">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Column 5</th>
      <td mat-cell *matCellDef="let row">{{ row.column5 }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
</div>
