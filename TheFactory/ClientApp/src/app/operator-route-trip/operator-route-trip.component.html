<div style="height: 400px; overflow: auto;">


  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
    <ng-container matColumnDef="departureDateTime">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Departure DateTime</th>
      <td mat-cell *matCellDef="let row">{{ row.departureDateTime | date:'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="arrivalDateTime">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Arrival DateTime</th>
      <td mat-cell *matCellDef="let row">{{ row.arrivalDateTime | date:'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
      <td mat-cell *matCellDef="let row">{{ row.price | currency }}</td>
    </ng-container>

    <ng-container matColumnDef="notes">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Notes</th>
      <td mat-cell *matCellDef="let row">{{ row.notes }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['departureDateTime', 'arrivalDateTime', 'price', 'notes']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['departureDateTime', 'arrivalDateTime', 'price', 'notes'];"></tr>
  </table>
  <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
</div>
  <!-- Create Trip Form -->
  <form (ngSubmit)="createTrip()" #tripForm="ngForm" style="margin-bottom: 1em;">
    <mat-form-field>
      <mat-label>Departure DateTime</mat-label>
      <input matInput [(ngModel)]="newTrip.departureDateTime" name="departureDateTime" type="datetime-local" required placeholder="Select departure date and time">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Arrival DateTime</mat-label>
      <input matInput [(ngModel)]="newTrip.arrivalDateTime" name="arrivalDateTime" type="datetime-local" required placeholder="Select arrival date and time">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Price</mat-label>
      <input matInput [(ngModel)]="newTrip.price" name="price" type="number" required placeholder="Enter price">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Notes</mat-label>
      <input matInput [(ngModel)]="newTrip.notes" name="notes" placeholder="Enter notes (optional)">
    </mat-form-field>
    <mat-checkbox [(ngModel)]="newTrip.active" name="active">Active</mat-checkbox>
    <button mat-raised-button color="primary" type="submit" [disabled]="tripForm.invalid">Create Trip</button>
    <span *ngIf="createTripMessage" style="margin-left:1em;">{{ createTripMessage }}</span>
  </form>
