<div *ngIf="loading">Loading...</div>
<div *ngIf="error">{{ error }}</div>
<div *ngIf="!loading && isLoggedIn">
  <p>
    Logged in as <strong>{{ userName }}</strong>
    ({{ userRole }}). <a class="logout-link" (click)="logout()">Log out</a>
  </p>
</div>
<div *ngIf="!loading && !isLoggedIn">
  <p>You must be logged in to view this screen.</p>
</div>
<div *ngIf="summary && isLoggedIn && isAdminRole(userRole)">
  <h2>Admin Summary</h2>
  <ul>
      <li>My Operators: {{ summary.totalOperators }}</li>
      <ul>
        <li *ngFor="let operator of summary.operatorNames">
          <a href="#" (click)="viewOperator(operator)">{{ operator }}</a>
        </li>
      </ul>   
  </ul>
</div>
<div *ngIf="isLoggedIn && !isAdminRole(userRole) && userRole !== 'OperatorAdmin'">
  <p>You do not have permission to view this screen.</p>
  <button (click)="requestPermission()">Request Permission</button>
</div>
<div *ngIf="isLoggedIn && isAdminRole(userRole)">
  <h3>Change User Role</h3>
  <form (ngSubmit)="changeUserRole()">
    <input type="email" [(ngModel)]="targetEmail" name="targetEmail" placeholder="User Email" required />
    <select [(ngModel)]="newUserRoleId" name="newUserRoleId" required>
      <option [value]="1">SystemAdmin</option>
      <option [value]="2">Admin</option>
      <option [value]="3">OperatorAdmin</option>
      <option [value]="4">Operator</option>
      <option [value]="5">Customer</option>
      <option [value]="6">Public</option>
    </select>
    <button type="submit">Change Role</button>
  </form>
  <div *ngIf="roleChangeMessage">{{ roleChangeMessage }}</div>
</div>
<app-operator-admin *ngIf="isLoggedIn && userRole === 'OperatorAdmin'"></app-operator-admin>
